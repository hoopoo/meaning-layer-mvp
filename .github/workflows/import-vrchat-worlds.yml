name: Import VRChat worlds

# Grows the registry by ingesting popular VRChat worlds via the Web API.
# Runs the same CLI as `npm run worlds:import:vrchat`. Idempotent: only new
# worlds (deduped by wrld_* id) are added. Requires VRChat auth secrets.
# When the primary sort is exhausted, fallback sorts are tried automatically.

on:
  schedule:
    # Daily at 00:30 UTC (09:30 JST), after the Roblox import
    - cron: "30 0 * * *"
  workflow_dispatch:
    inputs:
      sort:
        description: "Primary VRChat sort (popularity | heat | created | updated)"
        required: false
        default: "popularity"
      fallback_sorts:
        description: "Comma-separated fallback sorts, or 'none' for primary only"
        required: false
        default: "heat,created,updated"
      limit:
        description: "How many new worlds to import"
        required: false
        default: "10"

concurrency:
  group: import-worlds
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check VRChat credentials
        env:
          VRCHAT_AUTH_COOKIE: ${{ secrets.VRCHAT_AUTH_COOKIE }}
          VRCHAT_USERNAME: ${{ secrets.VRCHAT_USERNAME }}
          VRCHAT_PASSWORD: ${{ secrets.VRCHAT_PASSWORD }}
          VRCHAT_2FA_SECRET: ${{ secrets.VRCHAT_2FA_SECRET }}
        run: |
          if [ -n "$VRCHAT_USERNAME" ] && [ -n "$VRCHAT_PASSWORD" ]; then
            echo "VRChat auth: using VRCHAT_USERNAME + VRCHAT_PASSWORD (recommended for CI)."
            if [ -n "$VRCHAT_2FA_SECRET" ]; then
              echo "VRChat 2FA: VRCHAT_2FA_SECRET is set."
            fi
          elif [ -n "$VRCHAT_AUTH_COOKIE" ]; then
            echo "VRChat auth: using VRCHAT_AUTH_COOKIE fallback (browser cookies often expire in CI)."
          else
            echo "::error::Missing VRChat secrets. Add VRCHAT_USERNAME + VRCHAT_PASSWORD (+ VRCHAT_2FA_SECRET if 2FA is enabled) in repository Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Import VRChat worlds
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          VRCHAT_AUTH_COOKIE: ${{ secrets.VRCHAT_AUTH_COOKIE }}
          VRCHAT_USERNAME: ${{ secrets.VRCHAT_USERNAME }}
          VRCHAT_PASSWORD: ${{ secrets.VRCHAT_PASSWORD }}
          VRCHAT_2FA_SECRET: ${{ secrets.VRCHAT_2FA_SECRET }}
          VRCHAT_TWO_FACTOR_AUTH_COOKIE: ${{ secrets.VRCHAT_TWO_FACTOR_AUTH_COOKIE }}
          SORT: ${{ github.event.inputs.sort || 'popularity' }}
          FALLBACK_SORTS: ${{ github.event.inputs.fallback_sorts || 'heat,created,updated' }}
          LIMIT: ${{ github.event.inputs.limit || '10' }}
        run: npm run worlds:import:vrchat
