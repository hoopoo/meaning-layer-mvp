name: Import Roblox worlds

# Grows the registry on a schedule by ingesting popular Roblox experiences.
# Runs the same CLI as `npm run worlds:import`. Idempotent: only new worlds
# (deduped by placeId) are added, so re-running keeps the registry growing
# without duplicates. Imported worlds are left "Undecided" for humans to interpret.
# When the primary sort is exhausted, the importer falls back to other Roblox
# discovery sorts (top-trending, top-playing-now, etc.) until LIMIT is reached.

on:
  schedule:
    # Daily at 00:00 UTC (09:00 JST)
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      sort:
        description: "Primary Roblox sort (fallback sorts are tried automatically if this feed is exhausted)"
        required: false
        default: "up-and-coming"
      fallback_sorts:
        description: "Comma-separated fallback sorts, or 'none' to use only the primary sort"
        required: false
        default: "top-trending,top-playing-now,fun-with-friends,top-revisited"
      limit:
        description: "How many new worlds to import"
        required: false
        default: "10"

# Avoid overlapping runs writing to the same DB.
concurrency:
  group: import-worlds
  cancel-in-progress: false

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Import worlds
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SORT: ${{ github.event.inputs.sort || 'up-and-coming' }}
          FALLBACK_SORTS: ${{ github.event.inputs.fallback_sorts || 'top-trending,top-playing-now,fun-with-friends,top-revisited' }}
          LIMIT: ${{ github.event.inputs.limit || '10' }}
        run: npm run worlds:import
